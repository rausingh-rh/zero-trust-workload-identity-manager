          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_spiffe
            federatesWith:
              - trustDomain: apps.CLUSTER-B.example.com
                bundleEndpointUrl: https://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: spiffe://apps.cluster-b.example.com/spire/server
      expectedError: "spec.federation.federatesWith[0].trustDomain in body should match '^[a-z0-9._-]{1,255}$'"

    # Category 14: Invalid endpointSpiffeId pattern

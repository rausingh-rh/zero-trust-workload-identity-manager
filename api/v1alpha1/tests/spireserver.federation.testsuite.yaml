              profile: https_spiffe
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: http://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: spiffe://apps.cluster-b.example.com/spire/server
      expectedError: "spec.federation.federatesWith[0].bundleEndpointUrl in body should match '^https://.*'"

    # Category 13: Invalid trustDomain pattern
    - name: Should reject federatesWith with invalid trustDomain pattern (uppercase)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer

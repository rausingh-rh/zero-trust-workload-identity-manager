            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: http://acme.example.com/directory
                  domainName: spire.example.com
                  email: admin@example.com
      expectedError: "spec.federation.bundleEndpoint.httpsWeb.acme.directoryUrl in body should match '^https://.*'"

    # Category 11: Invalid ACME email pattern

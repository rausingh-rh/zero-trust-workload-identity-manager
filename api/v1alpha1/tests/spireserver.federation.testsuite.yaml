                  directoryUrl: https://acme.example.com/directory
                  domainName: spire.example.com
                  email: invalid-email
      expectedError: "spec.federation.bundleEndpoint.httpsWeb.acme.email in body should match"

    # Category 12: Invalid bundleEndpointUrl pattern
    - name: Should reject federatesWith with invalid bundleEndpointUrl (non-https)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer

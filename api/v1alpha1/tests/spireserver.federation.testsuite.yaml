apiVersion: apiextensions.k8s.io/v1
name: "SpireServer Federation Tests"
crdName: spireservers.operator.openshift.io
tests:
  onCreate:
    # Category 1: Minimal Valid Create (without federation)
    - name: Should be able to create a minimal SpireServer without federation
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: example.com
          clusterName: test-cluster
          jwtIssuer: https://example.com
          caSubject:
            commonName: SPIRE CA
            organization: Example Org
            country: US
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: example.com
          clusterName: test-cluster
          jwtIssuer: https://example.com
          caSubject:
            commonName: SPIRE CA
            organization: Example Org
            country: US
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3

    # Category 2: Valid Federation with https_spiffe profile
    - name: Should accept valid federation with https_spiffe profile
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
            organization: Example Org
            country: US
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 300
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: https://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: spiffe://apps.cluster-b.example.com/spire/server
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
            organization: Example Org
            country: US
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 300
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: https://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: spiffe://apps.cluster-b.example.com/spire/server

    # Category 3: Valid Federation with https_web profile and ACME
    - name: Should accept valid federation with https_web profile using ACME
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              refreshHint: 600
              httpsWeb:
                acme:
                  directoryUrl: https://acme-v02.api.letsencrypt.org/directory
                  domainName: spire-federation.example.com
                  email: admin@example.com
                  tosAccepted: "true"
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: https://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_web
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              refreshHint: 600
              httpsWeb:
                acme:
                  directoryUrl: https://acme-v02.api.letsencrypt.org/directory
                  domainName: spire-federation.example.com
                  email: admin@example.com
                  tosAccepted: "true"
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: https://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_web

    # Category 4: Valid Federation with https_web profile and servingCert
    - name: Should accept valid federation with https_web profile using servingCert
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400
                  externalSecretRef: federation-tls-secret
            managedRoute: "false"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400
                  externalSecretRef: federation-tls-secret
            managedRoute: "false"

    # Category 5: Singleton Name Validation
    - name: Should reject SpireServer with name other than 'cluster'
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: not-cluster
        spec:
          trustDomain: example.com
          clusterName: test-cluster
          jwtIssuer: https://example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expectedError: "SpireServer is a singleton, .metadata.name must be 'cluster'"

    # Category 6: Invalid https_web without httpsWeb config
    - name: Should reject https_web profile without httpsWeb configuration
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
      expectedError: "httpsWeb is required when profile is https_web"

    # Category 7: Invalid https_spiffe without endpointSpiffeId
    - name: Should reject https_spiffe federatesWith without endpointSpiffeId
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_spiffe
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: https://spire-federation.cluster-b.example.com
                bundleEndpointProfile: https_spiffe
      expectedError: "endpointSpiffeId is required when bundleEndpointProfile is https_spiffe"

    # Category 8: Invalid httpsWeb with both acme and servingCert
    - name: Should reject httpsWeb with both acme and servingCert configured
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          trustDomain: apps.cluster-a.example.com
          clusterName: cluster-a
          jwtIssuer: https://cluster-a.example.com
          caSubject:
            commonName: SPIRE CA
          persistence:
            size: 1Gi
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: https://acme-v02.api.letsencrypt.org/directory
                  domainName: spire.example.com
                  email: admin@example.com
                servingCert:
                  externalSecretRef: my-secret
      expectedError: "exactly one of acme or servingCert must be set"

    # Category 9: Invalid httpsWeb with neither acme nor servingCert
    - name: Should reject httpsWeb with neither acme nor servingCert configured
      initial: |
        apiVersion: operator.openshift.io/v1alpha1

            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 30
      expectedError: "spec.federation.bundleEndpoint.refreshHint in body should be greater than or equal to 60"

    # Category 16: Invalid refreshHint (above maximum)
    - name: Should reject refreshHint above maximum (3600)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1

              httpsWeb: {}
      expectedError: "exactly one of acme or servingCert must be set"

    # Category 10: Invalid ACME directoryUrl pattern
    - name: Should reject ACME with invalid directoryUrl (non-https)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1

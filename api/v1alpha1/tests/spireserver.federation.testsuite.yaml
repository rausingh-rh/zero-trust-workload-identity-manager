                endpointSpiffeId: invalid-not-spiffe-uri
      expectedError: "spec.federation.federatesWith[0].endpointSpiffeId in body should match '^spiffe://.*'"

    # Category 15: Invalid refreshHint (below minimum)
    - name: Should reject refreshHint below minimum (60)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster

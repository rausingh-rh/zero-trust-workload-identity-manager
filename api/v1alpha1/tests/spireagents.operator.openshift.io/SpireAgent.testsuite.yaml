apiVersion: apiextensions.k8s.io/v1
name: "SpireAgent"
crdName: spireagents.operator.openshift.io
tests:
  onCreate:
    - name: Should be able to create a minimal SpireAgent with defaults only
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec: {}
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "/run/spire/agent-sockets"
          logLevel: "info"
          logFormat: "text"

    - name: Should reject SpireAgent with name other than cluster
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: not-cluster
        spec: {}
      expectedError: "SpireAgent is a singleton, .metadata.name must be 'cluster'"

    - name: Should reject SpireAgent with arbitrary name
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: my-agent
        spec:
          logLevel: "info"
      expectedError: "SpireAgent is a singleton, .metadata.name must be 'cluster'"

    - name: Should accept valid logLevel debug
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "debug"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "debug"

    - name: Should accept valid logLevel warn
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "warn"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "warn"

    - name: Should accept valid logLevel error
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "error"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "error"

    - name: Should reject invalid logLevel
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logLevel: "trace"
      expectedError: "spec.logLevel: Unsupported value"

    - name: Should accept valid logFormat json
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logFormat: "json"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logFormat: "json"

    - name: Should reject invalid logFormat
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          logFormat: "xml"
      expectedError: "spec.logFormat: Unsupported value"

    - name: Should accept valid socketPath
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "/var/run/spire/sockets"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "/var/run/spire/sockets"

    - name: Should reject socketPath without leading slash
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "run/spire/agent-sockets"
      expectedError: "spec.socketPath in body should match"

    - name: Should reject socketPath with invalid characters
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "/run/spire/../agent sockets"
      expectedError: "spec.socketPath in body should match"

    - name: Should accept nodeAttestor with k8sPSATEnabled true
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          nodeAttestor:
            k8sPSATEnabled: "true"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          nodeAttestor:
            k8sPSATEnabled: "true"

    - name: Should accept nodeAttestor with k8sPSATEnabled false
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          nodeAttestor:
            k8sPSATEnabled: "false"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          nodeAttestor:
            k8sPSATEnabled: "false"

    - name: Should reject nodeAttestor with invalid k8sPSATEnabled value
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          nodeAttestor:
            k8sPSATEnabled: "yes"
      expectedError: "spec.nodeAttestor.k8sPSATEnabled: Unsupported value"

    - name: Should accept workloadAttestors with k8sEnabled true
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "true"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "true"
            disableContainerSelectors: "false"
            useNewContainerLocator: "true"

    - name: Should accept workloadAttestors with k8sEnabled false
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "false"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "false"
            disableContainerSelectors: "false"
            useNewContainerLocator: "true"

    - name: Should reject workloadAttestors with invalid k8sEnabled value
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "enabled"
      expectedError: "spec.workloadAttestors.k8sEnabled: Unsupported value"

    - name: Should accept workloadAttestors with disableContainerSelectors true
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            disableContainerSelectors: "true"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            disableContainerSelectors: "true"
            k8sEnabled: "true"
            useNewContainerLocator: "true"

    - name: Should reject workloadAttestors with invalid disableContainerSelectors value
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            disableContainerSelectors: "yes"
      expectedError: "spec.workloadAttestors.disableContainerSelectors: Unsupported value"

    - name: Should accept workloadAttestors with useNewContainerLocator false
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            useNewContainerLocator: "false"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            useNewContainerLocator: "false"
            k8sEnabled: "true"
            disableContainerSelectors: "false"

    - name: Should reject workloadAttestors with invalid useNewContainerLocator value
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            useNewContainerLocator: "maybe"
      expectedError: "spec.workloadAttestors.useNewContainerLocator: Unsupported value"

    - name: Should accept workloadAttestorsVerification with type auto
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:

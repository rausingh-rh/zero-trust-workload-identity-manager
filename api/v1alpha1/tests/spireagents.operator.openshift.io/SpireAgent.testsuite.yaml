        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: auto

    - name: Should accept workloadAttestorsVerification with type skip
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: skip
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: skip

    - name: Should accept workloadAttestorsVerification with type hostCert and required fields
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/custom-certs
              hostCertFileName: my-ca.crt
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/custom-certs
              hostCertFileName: my-ca.crt

    - name: Should reject workloadAttestorsVerification with invalid type
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: mtls
      expectedError: "spec.workloadAttestors.workloadAttestorsVerification.type: Unsupported value"

    - name: Should reject workloadAttestorsVerification with type hostCert but missing hostCertBasePath
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertFileName: my-ca.crt
      expectedError: "hostCertBasePath is required when type is 'hostCert'"

    - name: Should reject workloadAttestorsVerification with type hostCert but missing hostCertFileName
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/custom-certs
      expectedError: "hostCertFileName is required when type is 'hostCert'"

    - name: Should reject workloadAttestorsVerification with type hostCert but empty hostCertBasePath
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: ""
              hostCertFileName: my-ca.crt
      expectedError: "hostCertBasePath is required when type is 'hostCert'"

    - name: Should reject workloadAttestorsVerification with type hostCert but empty hostCertFileName
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/custom-certs
              hostCertFileName: ""
      expectedError: "hostCertFileName is required when type is 'hostCert'"

    - name: Should reject hostCertFileName with invalid characters
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/custom-certs
              hostCertFileName: "../traversal.crt"
      expectedError: "spec.workloadAttestors.workloadAttestorsVerification.hostCertFileName in body should match"

    - name: Should accept full workloadAttestors configuration
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "true"
            disableContainerSelectors: "true"
            useNewContainerLocator: "false"
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/pki/tls
              hostCertFileName: kubelet-ca.crt
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          workloadAttestors:
            k8sEnabled: "true"
            disableContainerSelectors: "true"
            useNewContainerLocator: "false"
            workloadAttestorsVerification:
              type: hostCert
              hostCertBasePath: /etc/pki/tls
              hostCertFileName: kubelet-ca.crt


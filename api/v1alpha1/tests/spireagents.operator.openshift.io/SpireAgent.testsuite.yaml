    - name: Should accept SpireAgent with all optional fields populated
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "/var/run/spire/sockets"
          logLevel: "debug"
          logFormat: "json"
          nodeAttestor:
            k8sPSATEnabled: "true"
          workloadAttestors:
            k8sEnabled: "true"
            disableContainerSelectors: "false"
            useNewContainerLocator: "true"
            workloadAttestorsVerification:
              type: auto
          labels:
            app: spire-agent
            env: production
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          tolerations:
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireAgent
        metadata:
          name: cluster
        spec:
          socketPath: "/var/run/spire/sockets"
          logLevel: "debug"
          logFormat: "json"

apiVersion: apiextensions.k8s.io/v1
name: "SpireServer Federation Feature Tests"
crdName: spireservers.operator.openshift.io
tests:
  onCreate:
    # ===== Category 1: Minimal Valid Create =====
    - name: Should be able to create SpireServer with minimal federation config (https_spiffe profile)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://example.com"
          caSubject:
            organization: "Example Org"
          persistence:
            size: "1Gi"
            accessMode: "ReadWriteOnce"
          datastore:
            databaseType: "sqlite3"
            connectionString: "/run/spire/data/datastore.sqlite3"
          federation:
            bundleEndpoint:
              profile: https_spiffe
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 300
            managedRoute: "true"

    - name: Should be able to create SpireServer with federation and federatesWith peers
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://example.com"
          caSubject:
            organization: "Example Org"
          persistence:
            size: "1Gi"
            accessMode: "ReadWriteOnce"
          datastore:
            databaseType: "sqlite3"
            connectionString: "/run/spire/data/datastore.sqlite3"
          federation:
            bundleEndpoint:
              profile: https_spiffe
            federatesWith:
              - trustDomain: "apps.cluster-b.example.com"
                bundleEndpointUrl: "https://spire-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: "spiffe://apps.cluster-b.example.com/spire/server"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_spiffe
            federatesWith:
              - trustDomain: "apps.cluster-b.example.com"
                bundleEndpointUrl: "https://spire-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: "spiffe://apps.cluster-b.example.com/spire/server"

    # ===== Category 2: Valid Field Values =====
    - name: Should accept https_web profile with ACME configuration
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://example.com"
          caSubject:
            organization: "Example Org"
          persistence:
            size: "1Gi"
            accessMode: "ReadWriteOnce"
          datastore:
            databaseType: "sqlite3"
            connectionString: "/run/spire/data/datastore.sqlite3"
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
                  domainName: "spire.example.com"
                  email: "admin@example.com"
                  tosAccepted: "true"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
                  domainName: "spire.example.com"
                  email: "admin@example.com"
                  tosAccepted: "true"

    - name: Should accept https_web profile with servingCert configuration
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://example.com"
          caSubject:
            organization: "Example Org"
          persistence:
            size: "1Gi"
            accessMode: "ReadWriteOnce"
          datastore:
            databaseType: "sqlite3"
            connectionString: "/run/spire/data/datastore.sqlite3"
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  externalSecretRef: "my-tls-cert"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400
                  externalSecretRef: "my-tls-cert"


apiVersion: apiextensions.k8s.io/v1
name: SpireServer Federation
crdName: spireservers.operator.openshift.io
tests:
  onCreate:
    # ===== Category 1: Minimal Valid Create =====
    - name: Should be able to create a minimal SpireServer without federation
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0

    - name: Should be able to create SpireServer with federation using https_spiffe profile
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
          federation:
            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 300
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: "https://spire-server-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: "spiffe://apps.cluster-b.example.com/spire/server"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
          federation:
            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 300
            managedRoute: "true"
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: "https://spire-server-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: "spiffe://apps.cluster-b.example.com/spire/server"

    - name: Should be able to create SpireServer with federation using https_web profile with acme
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
                  domainName: "federation.example.com"
                  email: "admin@example.com"
                  tosAccepted: "true"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
          federation:
            bundleEndpoint:
              profile: https_web
              refreshHint: 300
              httpsWeb:
                acme:
                  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
                  domainName: "federation.example.com"
                  email: "admin@example.com"
                  tosAccepted: "true"
            managedRoute: "true"

    - name: Should be able to create SpireServer with federation using https_web profile with servingCert
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400
                  externalSecretRef: "my-tls-secret"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://issuer.example.com"
          caSubject:
            country: "US"
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: "/run/spire/data/datastore.sqlite3"
            maxOpenConns: 100
            maxIdleConns: 2
            connMaxLifetime: 0
          federation:
            bundleEndpoint:
              profile: https_web
              refreshHint: 300
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400
                  externalSecretRef: "my-tls-secret"
            managedRoute: "true"


          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: oracle
            connectionString: /run/spire/data/datastore.sqlite3
      expectedError: "spec.datastore.databaseType: Unsupported value"

    - name: Should accept federation with https_spiffe profile
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_spiffe
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: "https://spire-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: "spiffe://apps.cluster-b.example.com/spire/server"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_spiffe
              refreshHint: 300
            federatesWith:
              - trustDomain: apps.cluster-b.example.com
                bundleEndpointUrl: "https://spire-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_spiffe
                endpointSpiffeId: "spiffe://apps.cluster-b.example.com/spire/server"
            managedRoute: "true"

    - name: Should accept federation with https_web profile and acme
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
                  domainName: "federation.example.com"
                  email: "admin@example.com"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                acme:
                  directoryUrl: "https://acme-v02.api.letsencrypt.org/directory"
                  domainName: "federation.example.com"
                  email: "admin@example.com"
                  tosAccepted: "false"

    - name: Should accept federation with https_web profile and servingCert
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          federation:
            bundleEndpoint:
              profile: https_web
              httpsWeb:
                servingCert:
                  fileSyncInterval: 86400

    - name: Should reject https_web profile without httpsWeb config
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
          federation:
            bundleEndpoint:
              profile: https_web
      expectedError: "httpsWeb is required when profile is https_web"

    - name: Should reject httpsWeb with both acme and servingCert set

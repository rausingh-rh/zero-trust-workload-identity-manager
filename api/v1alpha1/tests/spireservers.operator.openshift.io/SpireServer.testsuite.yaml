apiVersion: apiextensions.k8s.io/v1
name: SpireServer
crdName: spireservers.operator.openshift.io
tests:
  onCreate:
    - name: Should be able to create a minimal SpireServer with required fields
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          logLevel: "info"
          logFormat: "text"
          caValidity: "24h"
          defaultX509Validity: "1h"
          defaultJWTValidity: "5m"
          caKeyType: "rsa-2048"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
            storageClass: ""
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
            maxOpenConns: 100
            maxIdleConns: 2
            disableMigration: "false"

    - name: Should reject SpireServer with name other than cluster
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: not-cluster
        spec:
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expectedError: "SpireServer is a singleton, .metadata.name must be 'cluster'"

    - name: Should reject invalid logLevel
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          logLevel: "trace"
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expectedError: "spec.logLevel: Unsupported value"

    - name: Should reject invalid logFormat
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          logFormat: "xml"
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expectedError: "spec.logFormat: Unsupported value"

    - name: Should accept valid logLevel debug
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          logLevel: "debug"
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          logLevel: "debug"

    - name: Should accept valid caKeyType ec-p384
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          caKeyType: "ec-p384"
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          caKeyType: "ec-p384"

    - name: Should reject invalid caKeyType
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer
        metadata:
          name: cluster
        spec:
          caKeyType: "rsa-1024"
          jwtIssuer: "https://oidc.example.com"
          caSubject: {}
          persistence:
            size: "1Gi"
            accessMode: ReadWriteOnce
          datastore:
            databaseType: sqlite3
            connectionString: /run/spire/data/datastore.sqlite3
      expectedError: "spec.caKeyType: Unsupported value"

    - name: Should reject invalid persistence size pattern
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: SpireServer

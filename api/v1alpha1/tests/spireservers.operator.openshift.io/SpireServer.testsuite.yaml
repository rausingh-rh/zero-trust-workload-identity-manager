                bundleEndpointUrl: "https://spire-federation.apps.cluster-b.example.com"
                bundleEndpointProfile: https_web
      expectedError: "spec.federation.federatesWith[0].trustDomain in body should match"

    - name: Should reject non-https bundleEndpointUrl in federatesWith
      initial: |
